name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main        # Trigger deploy when pushing to main branch
  pull_request:
    branches:
      - main        # Run tests/build check on pull requests too

# Allow this workflow to write to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Build & Test ──────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          # Prevents treating warnings as errors during build
          CI: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 1

  # ── Deploy to GitHub Pages ────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build                  # Only deploy if build succeeded
    if: github.ref == 'refs/heads/main'   # Only deploy from main branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          CI: false

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          commit_message: "Deploy: ${{ github.event.head_commit.message }}"
